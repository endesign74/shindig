<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30秒お悩みチェック｜あなたにぴったりのサポートを見つけましょう</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ivory: #FBF8F2;
    --navy: #1F3558;
    --navy-light: #2D4A7A;
    --gold: #C4827F;
    --gold-light: #EEBAB8;
    --gold-pale: #FBF0F0;
    --text-muted: #6B7A8F;
    --border: #E8E0D0;
    --white: #FFFFFF;
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 40px;
  }

  body {
    background-color: var(--ivory);
    color: var(--navy);
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
    line-height: 1.8;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* ─── HEADER ─── */
  .site-header {
    text-align: center;
    padding: 60px 24px 48px;
  }
  .site-header .eyebrow {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .site-header h1 {
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700;
    color: var(--navy);
    line-height: 1.4;
    margin-bottom: 16px;
  }
  .site-header h1 span {
    color: var(--gold);
  }
  .site-header .lead {
    font-size: 15px;
    color: var(--text-muted);
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.9;
  }
  .divider-ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin: 32px auto 0;
    max-width: 240px;
  }
  .divider-ornament::before,
  .divider-ornament::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold);
    opacity: 0.4;
  }
  .divider-ornament .diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    border-radius: 1px;
  }

  /* ─── WRAPPER ─── */
  .wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 20px 80px;
  }

  /* ─── PROGRESS ─── */
  .progress-area {
    margin-bottom: 36px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .progress-bar-bg {
    background: var(--border);
    border-radius: 999px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(to right, var(--gold), var(--gold-light));
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ─── QUESTION CARD ─── */
  .question-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px 36px;
    animation: fadeSlideIn 0.4s ease;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-number {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .q-text {
    font-size: 17px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  /* ─── CHOICES ─── */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--ivory);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px 20px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.7;
    color: var(--navy);
    transition: all 0.2s ease;
    width: 100%;
  }
  .choice-btn:hover {
    border-color: var(--gold);
    background: var(--gold-pale);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(196, 130, 127, 0.18);
  }
  .choice-btn:active {
    transform: translateY(0);
  }
  .choice-badge {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--white);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0;
    transition: all 0.2s ease;
    margin-top: 1px;
  }
  .choice-btn:hover .choice-badge {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--white);
  }

  /* ─── RESULT ─── */
  .result-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 48px 36px 40px;
    text-align: center;
    animation: fadeSlideIn 0.5s ease;
  }
  .result-badge {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    background: var(--gold-pale);
    border: 1px solid rgba(215, 162, 41, 0.3);
    border-radius: 999px;
    padding: 6px 20px;
    margin-bottom: 20px;
    font-weight: 600;
  }
  .result-icon {
    font-size: 52px;
    line-height: 1;
    margin-bottom: 20px;
    display: block;
  }
  .result-type-label {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .result-title {
    font-size: clamp(24px, 5vw, 32px);
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .result-title .gold { color: var(--gold); }
  .result-divider {
    width: 40px;
    height: 2px;
    background: var(--gold);
    border-radius: 999px;
    margin: 20px auto;
  }
  .result-description {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.9;
    max-width: 460px;
    margin: 0 auto 32px;
  }
  .result-recommendation {
    background: var(--gold-pale);
    border: 1px solid rgba(215, 162, 41, 0.25);
    border-radius: var(--radius-md);
    padding: 20px 24px;
    margin-bottom: 36px;
    text-align: left;
  }
  .result-recommendation p {
    font-size: 14px;
    line-height: 1.8;
    color: var(--navy);
  }
  .result-recommendation .rec-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 8px;
    display: block;
  }

  /* ─── CTA BUTTON ─── */
  .cta-wrap {
    margin-top: 12px;
  }
  .cta-btn {
    display: inline-block;
    background: var(--gold);
    color: var(--white);
    text-decoration: none;
    font-size: 16px;
    font-weight: 700;
    border-radius: var(--radius-xl);
    padding: 18px 36px;
    letter-spacing: 0.04em;
    line-height: 1.5;
    transition: all 0.25s ease;
    box-shadow: 0 6px 24px rgba(196, 130, 127, 0.35);
    width: 100%;
    max-width: 480px;
    text-align: center;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .cta-btn:hover {
    background: #B06E6B;
    box-shadow: 0 8px 30px rgba(196, 130, 127, 0.45);
    transform: translateY(-2px);
  }
  .cta-btn:active { transform: translateY(0); }
  .cta-note {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 12px;
  }

  /* ─── RETRY ─── */
  .retry-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    color: var(--text-muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    padding: 10px 24px;
    margin-top: 16px;
    transition: all 0.2s ease;
  }
  .retry-btn:hover {
    border-color: var(--navy);
    color: var(--navy);
  }

  /* ─── BACK ─── */
  .back-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    padding: 12px 0 0;
    display: block;
    transition: all 0.2s ease;
    letter-spacing: 0.03em;
  }
  .back-btn:hover {
    color: var(--navy);
  }

  /* ─── SCORE PILLS ─── */
  .score-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .score-pill {
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--ivory);
    color: var(--text-muted);
  }
  .score-pill.active {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--white);
    font-weight: 600;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 480px) {
    .question-card, .result-card { padding: 28px 20px; }
    .site-header { padding: 40px 20px 36px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <p class="eyebrow">30sec Self Check</p>
  <h1>30秒お悩みチェック<span>✦</span></h1>
  <p class="lead">5つの質問に答えるだけで、あなたにぴったりのサポートが分かります。<br>気軽にチェックしてみてください♪</p>
  <div class="divider-ornament"><span class="diamond"></span></div>
</header>

<div class="wrapper">
  <div id="progress-area" class="progress-area">
    <div class="progress-label">
      <span id="progress-text">Q1 / 5</span>
      <span id="progress-pct">20%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar" style="width: 20%;"></div>
    </div>
  </div>

  <div id="quiz-area"></div>
</div>

<script>
const questions = [
  {
    text: "いま、一番困っていることは？",
    choices: [
      { label: "A", text: "何を発信するか考えること" },
      { label: "B", text: "LINEやホームページなど集客の仕組みを整えること" },
      { label: "C", text: "投稿作成やメニュー表などのデザイン制作作業をすること" }
    ]
  },
  {
    text: "あなたのお客さまが入ってくる「メインのルート（導線）」はどこ？",
    choices: [
      { label: "A", text: "インスタやブログなどのSNS（だけど、なかなかお申し込みに繋がらない）" },
      { label: "B", text: "どこからお客さまが来ているのか、正直自分でもよく分かっていない" },
      { label: "C", text: "ご紹介やリアルでの出会い（その後HPやLINEを見てくれているか不安）" }
    ]
  },
  {
    text: "「公式LINE」をいま、どんな風に使えている？",
    choices: [
      { label: "A", text: "登録はしてもらえるけれど、そこから先の集客や会話に繋がっていない" },
      { label: "B", text: "アカウントはあるけれど、リッチメニューや配信の使い方が分からない" },
      { label: "C", text: "そもそもLINEではなく、ホームページやブログ、名刺だけで頑張っている" }
    ]
  },
  {
    text: "あなたの「名刺」や「ホームページ（ブログ）」をパッと見たときの正直な感想は？",
    choices: [
      { label: "A", text: "デザインが素人っぽくて、自分のブランディングや世界観に自信が持てない" },
      { label: "B", text: "内容は悪くないと思うけれど、そこからの問い合わせ対応がすべて手動で忙しすぎる" },
      { label: "C", text: "メニューや料金、申し込みボタンが分かりづらい（または、そもそもHPがない）" }
    ]
  },
  {
    text: "いま、一番「右腕サポーター」にサポートして欲しいことは？",
    choices: [
      { label: "A", text: "投稿がパッと垢抜けるテンプレートを作って、発信の軸を一緒に整理してほしい！" },
      { label: "B", text: "お問い合わせや予約が自動で回るような、LINEの仕組みを作ってラクにしてほしい！" },
      { label: "C", text: "渡しただけで申し込まれる名刺や、信頼されるホームページをまるごと整えてほしい！" }
    ]
  }
];

const results = {
  A: {
    icon: "✦",
    type: "発信迷い子タイプ",
    description: "SNSや発信まわりのモヤモヤが積み重なっているようです。デザインも文章も「なんとなく自己流」で続けてきたからこそ、発信の軸がブレてしまうのは当然のこと。",
    recommendation: "SNSのデザインテンプレート整備や、ブランドの発信軸作りのサポートがおすすめです。垢抜けた発信で、あなたらしい世界観をしっかり伝えていきましょう。"
  },
  B: {
    icon: "✦",
    type: "全部ひとりで頑張りすぎタイプ",
     description: "LINEのアカウントはあるけれど、メニューが未設定だったり、一斉配信の仕方が分からずに止まっていませんか？お客さまを迷わせてしまう導線や、手動での個別案内の繰り返しは、あなたの貴重な時間を奪ってしまいます。",
    recommendation: "見た目が美しいだけでなく、タップするだけで知りたい情報へスムーズに繋がる「リッチメニューの制作」と「公式LINEの導線設計」がおすすめです。登録したお客様が自然と次のステップへ進みたくなる、おもてなしの仕組みを整えましょう。"
  },
  C: {
    icon: "✦",
    type: "受け皿グラグラタイプ",
    description: "ご縁や紹介でお客さまは来てくれているのに、「ホームページを見て安心した」「名刺がステキ」と言われる受け皿が整っていない。せっかくのご縁を逃しているかもしれません。",
    recommendation: "ホームページの制作・リニューアルや、集客名刺・チラシの整えがおすすめです。プロの目線で「信頼される受け皿」を一緒につくっていきましょう。"
  }
};

// Priority: B > A > C
const priority = ['B', 'A', 'C'];

let current = 0;
let scores = { A: 0, B: 0, C: 0 };
let history = []; // 回答履歴

function renderQuestion(idx) {
  const q = questions[idx];
  const area = document.getElementById('quiz-area');
  const pct = Math.round(((idx + 1) / questions.length) * 100);
  document.getElementById('progress-text').textContent = `Q${idx + 1} / ${questions.length}`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-bar').style.width = `${pct}%`;

  const backBtn = idx > 0
    ? `<button class="back-btn" onclick="goBack()">← 前の質問に戻る</button>`
    : '';

  area.innerHTML = `
    <div class="question-card">
      <p class="q-number">QUESTION ${String(idx + 1).padStart(2, '0')}</p>
      <p class="q-text">${q.text}</p>
      <div class="choices">
        ${q.choices.map(c => `
          <button class="choice-btn" onclick="selectChoice('${c.label}')">
            <span class="choice-badge">${c.label}</span>
            <span>${c.text}</span>
          </button>
        `).join('')}
      </div>
      ${backBtn}
    </div>
  `;
}

function selectChoice(label) {
  history.push(label); // 回答を記録
  scores[label]++;
  current++;
  if (current < questions.length) {
    renderQuestion(current);
  } else {
    showResult();
  }
}

function goBack() {
  if (current <= 0) return;
  const prevLabel = history.pop(); // 直前の回答を取り消し
  scores[prevLabel]--;
  current--;
  document.getElementById('progress-area').style.display = 'block';
  renderQuestion(current);
}

function getWinner() {
  const maxScore = Math.max(...Object.values(scores));
  const tied = priority.filter(k => scores[k] === maxScore);
  return tied[0];
}

function showResult() {
  document.getElementById('progress-area').style.display = 'none';
  const winner = getWinner();
  const r = results[winner];
  const area = document.getElementById('quiz-area');

  const scoreHTML = priority.map(k =>
    `<span class="score-pill ${k === winner ? 'active' : ''}">${k}：${scores[k]}問</span>`
  ).join('');

  area.innerHTML = `
    <div class="result-card">
      <span class="result-badge">✦ 診断結果 ✦</span>
      <div class="score-row">${scoreHTML}</div>
      <span class="result-icon">${r.icon}</span>
      <p class="result-type-label">あなたのタイプは…</p>
      <h2 class="result-title">${r.type}</h2>
      <div class="result-divider"></div>
      <p class="result-description">${r.description}</p>
      <div class="result-recommendation">
        <span class="rec-label">RECOMMEND ✦</span>
        <p>${r.recommendation}</p>
      </div>
      <div class="cta-wrap">
        <a class="cta-btn" href="https://lin.ee/uGmhBDc" target="_blank" rel="noopener">右腕サポーターに作戦会議を申し込む</a>
        <p class="cta-note">※ 無料相談・お気軽にどうぞ</p>
      </div>
      <br>
      <button class="retry-btn" onclick="retryQuiz()">もう一度診断する</button>
    </div>
  `;
}

function retryQuiz() {
  current = 0;
  scores = { A: 0, B: 0, C: 0 };
  history = [];
  document.getElementById('progress-area').style.display = 'block';
  renderQuestion(0);
}

renderQuestion(0);
</script>

<script>
// 親ページにコンテンツの高さを送信してiframeを自動リサイズ
function sendHeight() {
  var height = document.body.scrollHeight;
  window.parent.postMessage({ iframeHeight: height }, '*');
}
window.addEventListener('load', sendHeight);
window.addEventListener('resize', sendHeight);
var observer = new MutationObserver(sendHeight);
observer.observe(document.body, { childList: true, subtree: true });
</script>
</body>
</html>
